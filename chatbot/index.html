<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANNA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #212121;
    --panel: #2f2f2f;
    --panel-2: #383838;
    --border: #4d4d4f;
    --border-soft: #3f3f3f;
    --text: #ececec;
    --text-dim: #b4b4b4;
    --text-faint: #8e8ea0;
    --accent: #10a37f;
    --accent-strong: #19c37d;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 9px;
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .app {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 32px 20px 20px;
  }

  .reset-btn {
    position: fixed;
    top: 20px;
    right: 22px;
    z-index: 5;
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.03em;
    padding: 4px 6px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--text-dim); }
  .reset-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .hero {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
    transition: opacity 0.35s ease, transform 0.35s ease, margin 0.35s ease, max-height 0.4s ease;
    overflow: hidden;
  }
  .hero.collapsed {
    max-height: 0;
    opacity: 0;
    transform: translateY(-8px);
    margin: 0;
    pointer-events: none;
  }
  .hero-top { margin-top: 12vh; }
  .hero h1 {
    font-size: 30px;
    font-weight: 600;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }
  .hidden { display: none !important; }
  .hero p.subtitle {
    color: var(--text-dim);
    font-size: 14.5px;
    margin: 0 0 30px;
    font-family: var(--font-display);
  }
  .hero p.subtitle .flicker { color: var(--accent-strong); }

  .chat-shell {
    width: 100%;
    max-width: 640px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 8px 2px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scrollbar-width: thin;
    scrollbar-color: #232833 transparent;
  }
  .chat-window::-webkit-scrollbar { width: 6px; }
  .chat-window::-webkit-scrollbar-thumb { background: #232833; border-radius: 10px; }

  .msg { max-width: 92%; animation: rise 0.28s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
    padding: 10px 15px;
    font-size: 14.5px;
    line-height: 1.5;
    color: var(--text);
  }

  .msg.bot { align-self: flex-start; max-width: 100%; }

  .prompt-line {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.03em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .prompt-line::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .bot-text {
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.65;
    color: #dbe2ea;
    white-space: pre-wrap;
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 15px;
    background: var(--accent-strong);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .msg-actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .msg-actions button {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s;
  }
  .msg-actions button:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }
  .msg-actions button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
    font-weight: 600;
  }
  .msg-actions button.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .msg-actions button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .composer-wrap {
    width: 100%;
    max-width: 640px;
    margin: 10px auto 0;
    position: sticky;
    bottom: 0;
    padding-bottom: 8px;
    background: linear-gradient(to top, var(--bg) 55%, transparent);
  }

  .composer-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 14px 10px;
  }
  .composer-card:focus-within { border-color: var(--border-soft); }

  .composer-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

  #chatInput {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 15px;
    line-height: 1.5;
    max-height: 96px;
    min-height: 24px;
    padding: 2px 4px 12px;
  }
  #chatInput::placeholder { color: var(--text-faint); }

  .composer-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

  .agent-tag {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 8px 6px 6px;
  }

  .composer-actions { display: flex; align-items: center; gap: 6px; }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent-strong); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn.mic-active { color: #fff; background: #ef4444; border-color: #ef4444; }

  #sendBtn { background: var(--accent); border-color: var(--accent); color: #ffffff; }
  #sendBtn:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

  @media (max-width: 480px) {
    .hero h1 { font-size: 24px; }
    .hero-top { margin-top: 8vh; }
    .reset-btn { top: 14px; right: 14px; }
  }

  @media (min-width: 481px) and (max-width: 900px) {
    .app { padding: 28px 32px 20px; }
    .hero, .chat-shell, .composer-wrap { max-width: 680px; }
    .hero-top { margin-top: 10vh; }
    .hero h1 { font-size: 28px; }
    .icon-btn { width: 38px; height: 38px; }
    .msg { max-width: 85%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
    .msg { animation: none; }
  }
</style>
</head>
<body>

  <button class="reset-btn hidden" id="resetBtn" type="button">reiniciar sessão</button>

  <div class="app">
    <div class="hero" id="hero">
      <div class="hero-top">
        <h1>HANNA <span style="color:var(--accent-strong);">·</span> em espera</h1>
        <p class="subtitle">Diagnóstico técnico sob demanda. <span class="flicker">Descreva a ocorrência</span> quando estiver pronto.</p>
      </div>
    </div>

    <div class="chat-shell">
      <div class="chat-window" id="chatWindow"></div>

      <div class="composer-wrap">
        <form class="composer-card" id="composerForm" style="margin-top:10px;">
          <textarea id="chatInput" rows="1" placeholder="Descreva a ocorrência..."></textarea>
          <div class="composer-row">
            <div class="agent-tag">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="4" y="8" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M9 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.6"/><circle cx="9" cy="14" r="1.2" fill="currentColor"/><circle cx="15" cy="14" r="1.2" fill="currentColor"/></svg>
              HANNA · IA
            </div>
            <div class="composer-actions">
              <span class="composer-divider" aria-hidden="true"></span>
              <button type="button" class="icon-btn" id="micBtn" title="Entrada por voz" aria-label="Entrada por voz">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="1.6"/><path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              </button>
              <button type="submit" class="icon-btn" id="sendBtn" disabled title="Transmitir" aria-label="Enviar mensagem">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

<script>
// ============================================================
// HANNA — versão 100% IA (sem regras locais / keywords / fuzzy matching)
//
// Toda mensagem do usuário é enviada direto pro Worker (Cloudflare),
// que repassa pra API da OpenRouter. Quem decide o que responder é
// inteiramente o modelo de IA, guiado pelo "system prompt" que está
// dentro do código do Worker (o arquivo que fica no dash.cloudflare.com,
// não este aqui).
//
// O histórico da conversa é enviado a cada mensagem, pra a IA manter
// contexto (lembrar o que já foi dito antes na mesma sessão).
// ============================================================

const CONTACT_LINK = "https://wa.me/5515981289296";
const HANNA_PROXY_URL = "https://hanna-proxy.luidysec.workers.dev";

const hero = document.getElementById("hero");
const chatWindow = document.getElementById("chatWindow");
const chatInput = document.getElementById("chatInput");
const composerForm = document.getElementById("composerForm");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const resetBtn = document.getElementById("resetBtn");

let prefersReducedMotion = false;
try {
  prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
} catch (e) {
  prefersReducedMotion = false;
}

let busy = false;
let started = false;

// Histórico simples da sessão, enviado ao Worker a cada chamada
// pra a IA manter contexto da conversa.
let history = [];

function scrollToBottom() {
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function collapseHero() {
  if (started) return;
  started = true;
  hero.classList.add("collapsed");
  resetBtn.classList.remove("hidden");
}

function addUserMessage(text) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.textContent = text;
  chatWindow.appendChild(el);
  scrollToBottom();
}

function addBotMessage(text, { actions } = {}) {
  return new Promise((resolve) => {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";

    const promptLine = document.createElement("div");
    promptLine.className = "prompt-line";
    promptLine.textContent = "HANNA";
    wrap.appendChild(promptLine);

    const textEl = document.createElement("span");
    textEl.className = "bot-text";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    wrap.appendChild(textEl);
    wrap.appendChild(cursor);

    chatWindow.appendChild(wrap);
    scrollToBottom();

    const finish = () => {
      cursor.remove();
      if (actions && actions.length) {
        const actionsWrap = document.createElement("div");
        actionsWrap.className = "msg-actions";
        actions.forEach(({ label, primary, onClick }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = label;
          if (primary) btn.classList.add("primary");
          btn.addEventListener("click", onClick);
          actionsWrap.appendChild(btn);
        });
        wrap.appendChild(actionsWrap);
      }
      scrollToBottom();
      resolve();
    };

    if (prefersReducedMotion) {
      textEl.textContent = text;
      finish();
      return;
    }

    let i = 0;
    const speed = 14;
    const interval = setInterval(() => {
      textEl.textContent = text.slice(0, i);
      scrollToBottom();
      i++;
      if (i > text.length) {
        clearInterval(interval);
        finish();
      }
    }, speed);
  });
}

function addThinkingBubble() {
  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.innerHTML = `<div class="prompt-line">HANNA</div><span class="bot-text">Processando sinal…</span>`;
  chatWindow.appendChild(wrap);
  scrollToBottom();
  return wrap;
}

function ctaActions(extra = []) {
  return [
    {
      label: "acionar especialista",
      primary: true,
      onClick: () => window.open(CONTACT_LINK, "_blank", "noopener"),
    },
    ...extra,
  ];
}

// Chamada real ao Worker/OpenRouter — sem nenhuma regra local no meio.
async function askAI(text) {
  const bubble = addThinkingBubble();
  try {
    const res = await fetch(HANNA_PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history }),
    });
    if (!res.ok) throw new Error("proxy indisponível");
    const data = await res.json();
    const reply = data.reply || "Não consegui processar essa mensagem no momento.";

    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: reply });
    // mantém só as últimas mensagens pra não crescer indefinidamente
    if (history.length > 20) history = history.slice(-20);

    bubble.remove();
    await addBotMessage(reply, { actions: ctaActions() });
  } catch (e) {
    bubble.remove();
    await addBotMessage(
      "Não consegui me conectar ao sistema de diagnóstico agora. Tente novamente em instantes, ou fale direto com o especialista.",
      { actions: ctaActions() }
    );
  }
}

async function sendMessage(text) {
  if (busy) return;
  busy = true;
  startChat();
  addUserMessage(text);
  await askAI(text);
  busy = false;
}

function updateSendState() {
  sendBtn.disabled = chatInput.value.trim().length === 0;
}

function autoResize() {
  chatInput.style.height = "auto";
  chatInput.style.height = Math.min(chatInput.scrollHeight, 96) + "px";
}

chatInput.addEventListener("input", () => {
  updateSendState();
  autoResize();
});

function trySendMessage() {
  const text = chatInput.value.trim();
  if (!text || busy) return;
  chatInput.value = "";
  autoResize();
  updateSendState();
  sendMessage(text);
}

chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    trySendMessage();
  }
});

composerForm.addEventListener("submit", (e) => {
  e.preventDefault();
  trySendMessage();
});

resetBtn.addEventListener("click", () => {
  chatWindow.innerHTML = "";
  hero.classList.remove("collapsed");
  resetBtn.classList.add("hidden");
  started = false;
  history = [];
});

(function setupMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.style.display = "none";
    return;
  }
  const recognition = new SpeechRecognition();
  recognition.lang = "pt-BR";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  let listening = false;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    chatInput.value = transcript;
    autoResize();
    updateSendState();
  };
  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove("mic-active");
  };
  recognition.onerror = () => {
    listening = false;
    micBtn.classList.remove("mic-active");
  };

  micBtn.addEventListener("click", () => {
    if (listening) {
      recognition.stop();
      return;
    }
    listening = true;
    micBtn.classList.add("mic-active");
    try {
      recognition.start();
    } catch (e) {
      listening = false;
      micBtn.classList.remove("mic-active");
    }
  });
})();

function startChat() {
  if (started) return;
  collapseHero();
}

chatInput.addEventListener("focus", startChat, { once: true });
</script>
</body>
</html>
